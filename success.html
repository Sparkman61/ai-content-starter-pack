<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment Confirmed | Lab Ventures</title>
  <style>
    :root {
      --bg: #0b1020;
      --panel: rgba(19, 26, 47, 0.92);
      --text: #eef2ff;
      --muted: #b7c0e0;
      --accent: #7c9cff;
      --accent2: #94f0c1;
      --line: rgba(255, 255, 255, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at top, rgba(124, 156, 255, 0.24), transparent 30%),
        linear-gradient(180deg, #0b1020 0%, #0f1730 100%);
      color: var(--text);
      font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
    }

    .card {
      width: min(100%, 760px);
      padding: 40px 32px;
      border-radius: 24px;
      background: var(--panel);
      border: 1px solid var(--line);
      text-align: center;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
    }

    h1 {
      margin: 0 0 16px;
      font-size: clamp(2rem, 5vw, 3.2rem);
    }

    p {
      margin: 0;
      color: var(--muted);
      font-size: 1.08rem;
      line-height: 1.6;
    }

    strong {
      color: var(--accent2);
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Payment confirmed!</h1>
    <p>We&apos;ll begin optimizing your Google Business Profile within 2 business days. Check your email for next steps. <strong>&mdash; Lab Ventures</strong></p>
  </main>
</body>
</html>
